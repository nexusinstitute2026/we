<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus LMS | Quiz Reports</title>
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><a href="../dashboard/teacher.html"><img src="../images/logo.png" alt="Nexus"><div><div class="brand-name eng">NEXUS</div><div class="brand-sub">LMS</div></div></a></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="../dashboard/teacher.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
      <a class="nav-item" href="../teacher/assignments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>Assignments</a>
      <a class="nav-item" href="../teacher/quiz-builder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Quiz Builder</a>
      <a class="nav-item" href="../teacher/activity.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Activity Marks</a>
      <a class="nav-item" href="../teacher/progress.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Student Progress</a>
      <a class="nav-item active" href="../teacher/reports.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Quiz Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="logout-btn"><div class="user-avatar" id="user-avatar">T</div><div class="user-info"><div class="user-name" id="user-name">Loading</div><div class="user-role" id="user-role">ගුරුවරයා</div></div></div>
    </div>
  </aside>

  <div class="dash-main">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">Quiz <span>Reports</span></h1></div>
    </header>
    <main class="dash-content">
      
      <div class="card-flat" style="margin-bottom:2rem;display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="margin:0;min-width:250px">
          <label class="form-label">පාඨමාලාව</label>
          <select id="course-select" class="form-input"></select>
        </div>
        <div class="form-group" style="margin:0;min-width:250px">
          <label class="form-label">Quiz එක</label>
          <select id="quiz-select" class="form-input"><option value="">-- තෝරන්න --</option></select>
        </div>
      </div>

      <div class="stats-grid" id="report-stats" style="display:none">
        <div class="stat-card">
          <div class="stat-icon si-teal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
          <div class="stat-info"><div class="stat-num" id="stat-attempts">0</div><div class="stat-label">සම්පූර්ණ කළ සිසුන්</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon si-gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="stat-info"><div class="stat-num" id="stat-avg">0%</div><div class="stat-label">සාමාන්‍ය ලකුණු (Avg)</div></div>
        </div>
      </div>

      <div class="table-wrap" id="report-table-wrap" style="display:none">
        <div style="padding:1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0">
          <h2 style="font-size:1.1rem;font-weight:800">Leaderboard</h2>
          <button class="btn btn-sm btn-outline" id="export-csv">Export CSV</button>
        </div>
        <table class="data-table">
          <thead><tr><th>Rank</th><th>සිසුවා</th><th>WhatsApp</th><th>ලකුණු</th><th>ප්‍රතිශතය</th><th>කාලය</th></tr></thead>
          <tbody id="report-table"></tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<script type="module">
import { requireAuth, logout, populateUserChip } from '../js/auth.js';
import { getTeacherCourses } from '../js/admin.js';
import { getTeacherQuizzes, getQuizReport, getQuiz } from '../js/quiz.js';
import { initSidebar, showToast, fmtTime } from '../js/ui.js';

const profile = await requireAuth(['teacher']);
populateUserChip(profile); initSidebar();
document.getElementById('logout-btn').addEventListener('click', logout);

let allCourses = [];
let allQuizzes = [];
let currentAttempts = [];

async function loadInitial() {
  [allCourses, allQuizzes] = await Promise.all([
    getTeacherCourses(profile.id), getTeacherQuizzes(profile.id)
  ]);
  
  const cSelect = document.getElementById('course-select');
  cSelect.innerHTML = `<option value="">-- පාඨමාලාව තෝරන්න --</option>` + 
    allCourses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');

  const preselect = new URLSearchParams(location.search).get('course');
  if (preselect) { cSelect.value = preselect; updateQuizDropdown(); }
}

function updateQuizDropdown() {
  const cId = document.getElementById('course-select').value;
  const qSelect = document.getElementById('quiz-select');
  if(!cId) { qSelect.innerHTML = `<option value="">-- තෝරන්න --</option>`; return; }
  
  const filtered = allQuizzes.filter(q => q.course_id === cId);
  qSelect.innerHTML = `<option value="">-- Quiz එක තෝරන්න --</option>` + 
    filtered.map(q => `<option value="${q.id}">${q.title}</option>`).join('');
}

document.getElementById('course-select').addEventListener('change', updateQuizDropdown);
document.getElementById('quiz-select').addEventListener('change', loadReport);

async function loadReport() {
  const qId = document.getElementById('quiz-select').value;
  if(!qId) {
    document.getElementById('report-stats').style.display = 'none';
    document.getElementById('report-table-wrap').style.display = 'none';
    return;
  }

  try {
    const [quizData, attempts] = await Promise.all([
      getQuiz(qId), getQuizReport(qId)
    ]);
    currentAttempts = attempts;
    const totalQ = quizData.questions?.length || 0;

    document.getElementById('report-stats').style.display = 'grid';
    document.getElementById('report-table-wrap').style.display = 'block';

    document.getElementById('stat-attempts').textContent = attempts.length;
    
    if(attempts.length > 0 && totalQ > 0) {
      const sum = attempts.reduce((acc, a) => acc + a.score, 0);
      const avgRaw = sum / attempts.length;
      document.getElementById('stat-avg').textContent = Math.round((avgRaw / totalQ) * 100) + '%';
    } else {
      document.getElementById('stat-avg').textContent = '0%';
    }

    const tBody = document.getElementById('report-table');
    if(!attempts.length) {
      tBody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">සිසුන් කිසිවෙකු තවම පිළිතුරු දී නොමැත.</td></tr>`;
    } else {
      tBody.innerHTML = attempts.map(a => `
        <tr>
          <td><strong style="color:var(--teal)">#${a.rank || '-'}</strong></td>
          <td>${a.student?.full_name}</td>
          <td class="eng">${a.student?.whatsapp_number}</td>
          <td class="eng">${a.score} / ${totalQ}</td>
          <td class="eng">${Math.round((a.score/totalQ)*100)}%</td>
          <td class="eng">${fmtTime(a.time_taken)}</td>
        </tr>
      `).join('');
    }

  } catch(err) { showToast(err.message, 'error'); }
}

document.getElementById('export-csv').addEventListener('click', () => {
  if(!currentAttempts.length) return;
  const qTitle = document.getElementById('quiz-select').options[document.getElementById('quiz-select').selectedIndex].text;
  
  let csv = "Rank,Student Name,WhatsApp,Score,Time Taken (s)\n";
  currentAttempts.forEach(a => {
    csv += `${a.rank||'-'},"${a.student?.full_name}","${a.student?.whatsapp_number}",${a.score},${a.time_taken}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Report_${qTitle.replace(/\s+/g,'_')}.csv`;
  a.click();
});

loadInitial();
</script>
</body>
</html>
