<style>
.hierarchy-section { background: #fff; border: 1px solid #e2e8f0; border-radius: var(--radius-xl); margin-bottom: 1.5rem; overflow: hidden; }
.h-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; cursor: pointer; transition: background 0.2s; }
.h-header:hover { background: #f8fafc; }
.h-header h3 { font-size: 1.15rem; font-weight: 800; color: var(--dark); display: flex; align-items: center; gap: 0.75rem; }
.h-header h3 .h-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.h-body { border-top: 1px solid #f1f5f9; padding: 0; }
.h-body.collapsed { display: none; }
.h-actions { display: flex; gap: 0.5rem; align-items: center; }
.h-actions button { padding: 0.4rem 0.85rem; border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
.h-actions .btn-edit { background: rgba(245,158,11,0.12); color: var(--gold); }
.h-actions .btn-edit:hover { background: rgba(245,158,11,0.25); }
.h-actions .btn-del { background: rgba(244,63,94,0.1); color: var(--rose); }
.h-actions .btn-del:hover { background: rgba(244,63,94,0.2); }
.h-actions .btn-add { background: rgba(13,148,136,0.1); color: var(--teal); }
.h-actions .btn-add:hover { background: rgba(13,148,136,0.2); }

.cat-block { border-bottom: 1px solid #f1f5f9; }
.cat-block:last-child { border-bottom: none; }
.cat-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem 1rem 2.5rem; background: #fafbfc; }
.cat-header h4 { font-size: 1rem; font-weight: 700; color: var(--dark3); display: flex; align-items: center; gap: 0.5rem; }
.cat-header h4::before { content: '📂'; font-size: 1rem; }

.sub-block { padding: 0.85rem 1.5rem 0.85rem 3.5rem; display: flex; align-items: flex-start; justify-content: space-between; border-top: 1px solid #f8fafc; gap: 1rem; flex-wrap: wrap; }
.sub-info { flex: 1; min-width: 200px; }
.sub-info .sub-name { font-weight: 700; color: var(--teal); font-size: 0.95rem; }
.sub-info .sub-teacher { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.course-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
.course-chip { display: inline-flex; align-items: center; gap: 0.4rem; background: #f0fdfa; border: 1px solid #ccfbf1; padding: 0.3rem 0.75rem; border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 600; color: var(--dark3); }
.course-chip .chip-del { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--rose); cursor: pointer; transition: background 0.2s; }
.course-chip .chip-del:hover { background: rgba(244,63,94,0.15); }
.course-chip .chip-edit { cursor: pointer; color: var(--gold); font-size: 0.7rem; }
.course-chip .chip-edit:hover { color: var(--dark); }

.add-row { padding: 0.75rem 1.5rem; display: flex; gap: 0.5rem; align-items: center; }
.add-row input { flex: 1; padding: 0.5rem 0.85rem; border: 1.5px solid #e2e8f0; border-radius: var(--radius-md); font-size: 0.85rem; outline: none; transition: border 0.2s; font-family: inherit; }
.add-row input:focus { border-color: var(--teal); }
.add-row select { padding: 0.5rem 0.85rem; border: 1.5px solid #e2e8f0; border-radius: var(--radius-md); font-size: 0.85rem; outline: none; min-width: 160px; }
.inline-btn { padding: 0.5rem 1rem; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
.inline-btn-teal { background: var(--g-teal); color: #fff; }
.inline-btn-teal:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,148,136,0.3); }

.empty-row { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; }

/* Edit inline */
.edit-inline { display: flex; gap: 0.5rem; align-items: center; }
.edit-inline input { padding: 0.4rem 0.7rem; border: 1.5px solid var(--gold); border-radius: 0.5rem; font-size: 0.85rem; outline: none; font-family: inherit; }
.edit-inline .save-icon { color: var(--teal); cursor: pointer; font-weight: 700; }
.edit-inline .cancel-icon { color: var(--rose); cursor: pointer; }

/* Modal Styles */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; }
.modal-content { background: #fff; width: 90%; max-width: 600px; border-radius: var(--radius-xl); padding: 2rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 1rem; }
.modal-title { font-size: 1.25rem; font-weight: 800; color: var(--dark); }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
.month-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
.month-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-md); flex-wrap: wrap; gap: 0.5rem; }
.month-item-info { display: flex; flex-direction: column; gap: 0.2rem; flex: 1; min-width: 200px; }
.month-item-title { font-weight: 700; color: var(--dark3); font-size: 0.95rem; }
.month-item-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 0.5rem; align-items: center; }
.modal-add-form { display: flex; flex-wrap: wrap; gap: 0.5rem; background: #f0fdfa; padding: 1rem; border-radius: var(--radius-md); border: 1px solid #ccfbf1; }
.modal-add-form input { flex: 1; min-width: 120px; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; outline: none; font-family: inherit;}
.modal-add-form input:focus { border-color: var(--teal); }
</style>
