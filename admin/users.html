<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus LMS | පරිශීලකයන්</title>
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/dashboard.css">
<style>
.user-card { background: #fff; border: 1px solid #e2e8f0; border-radius: var(--radius-lg); padding: 1.25rem; display: flex; align-items: center; gap: 1rem; transition: all 0.3s; }
.user-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-2px); }
.user-card .u-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 800; color: #fff; flex-shrink: 0; font-size: 1.1rem; }
.user-card .u-info { flex: 1; min-width: 0; }
.user-card .u-name { font-weight: 700; font-size: 0.95rem; }
.user-card .u-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.user-card .u-actions { display: flex; gap: 0.4rem; }
.users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.search-box { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.search-box input { flex: 1; min-width: 200px; padding: 0.7rem 1.25rem; border: 1.5px solid #e2e8f0; border-radius: var(--radius-full); font-size: 0.9rem; outline: none; font-family: inherit; }
.search-box input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
</style>
</head>
<body>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><a href="../dashboard/admin.html"><img src="../images/logo.png" alt="Nexus"><div><div class="brand-name eng">NEXUS</div><div class="brand-sub">Admin</div></div></a></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="../dashboard/admin.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
      <a class="nav-item" href="../admin/payments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>ගෙවීම්</a>
      <a class="nav-item active" href="../admin/users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>පරිශීලකයන්</a>
      <a class="nav-item" href="../admin/courses.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>පාඨමාලා</a>
      <a class="nav-item" href="../admin/enrollments.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>ලියාපදිංචි</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="logout-btn">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info"><div class="user-name" id="user-name">Admin</div><div class="user-role" id="user-role">පරිපාලක</div></div>
      </div>
    </div>
  </aside>

  <div class="dash-main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">පරිශීලක <span>කළමනාකරණය</span></h1>
      </div>
    </header>
    <main class="dash-content">
      <!-- Teachers Section -->
      <div class="section-header">
        <h2>ගුරුවරුන් <span id="teacher-count"></span></h2>
        <button class="btn btn-teal btn-sm" onclick="openModal('add-teacher-modal')">+ නව ගුරුවරයෙක්</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-teachers" placeholder="🔍 ගුරුවරයෙකු සොයන්න...">
      </div>
      <div class="users-grid" id="teachers-grid"></div>

      <!-- Students Section -->
      <div class="section-header" style="margin-top:2rem">
        <h2>සිසුන් <span id="student-count"></span></h2>
      </div>
      <div class="search-box">
        <input type="text" id="search-students" placeholder="🔍 සිසුවෙකු සොයන්න...">
      </div>
      <div class="users-grid" id="students-grid"></div>
    </main>
  </div>
</div>

<!-- Add Teacher Modal -->
<div class="modal-overlay" id="add-teacher-modal">
  <div class="modal">
    <div class="modal-header"><h3>නව ගුරුවරයෙක් එකතු කරන්න</h3><button class="modal-close" onclick="closeModal('add-teacher-modal')">✕</button></div>
    <div class="modal-body">
      <form id="add-teacher-form">
        <div class="form-group"><label class="form-label">නම *</label><input type="text" class="form-input" id="t-name" required></div>
        <div class="form-group"><label class="form-label">WhatsApp *</label><input type="tel" class="form-input eng" id="t-wa" required placeholder="07XXXXXXXX"></div>
        <div class="form-group"><label class="form-label">ID අංකය *</label><input type="text" class="form-input eng" id="t-id" required></div>
        <div class="form-group"><label class="form-label">පාසල</label><input type="text" class="form-input" id="t-school"></div>
        <div class="form-group"><label class="form-label">ලිපිනය</label><input type="text" class="form-input" id="t-address"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('add-teacher-modal')">අවලංගු කරන්න</button>
      <button class="btn btn-teal" id="save-teacher-btn">සුරකින්න</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="edit-user-modal">
  <div class="modal">
    <div class="modal-header"><h3>පරිශීලකයා සංස්කරණය</h3><button class="modal-close" onclick="closeModal('edit-user-modal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="eu-id">
      <div class="form-group"><label class="form-label">නම</label><input type="text" class="form-input" id="eu-name"></div>
      <div class="form-group"><label class="form-label">පාසල</label><input type="text" class="form-input" id="eu-school"></div>
      <div class="form-group"><label class="form-label">ලිපිනය</label><input type="text" class="form-input" id="eu-address"></div>
      <div class="form-group">
        <label class="form-label">භූමිකාව</label>
        <select class="form-input" id="eu-role">
          <option value="student">සිසුවා</option>
          <option value="teacher">ගුරුවරයා</option>
          <option value="admin">පරිපාලක</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('edit-user-modal')">අවලංගු කරන්න</button>
      <button class="btn btn-gold" id="update-user-btn">යාවත්කාලීන කරන්න</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
import { requireAuth, logout, populateUserChip } from '../js/auth.js';
import { getUsersByRole, createTeacher, updateUserProfile, deleteUser } from '../js/admin.js';
import { initSidebar, showToast, openModal, closeModal } from '../js/ui.js';

const profile = await requireAuth(['admin']);
populateUserChip(profile); initSidebar();
document.getElementById('logout-btn').addEventListener('click', logout);
window.openModal = openModal; window.closeModal = closeModal;

const tColors = ['var(--g-teal)', 'var(--g-gold)', 'var(--g-purple)', 'var(--g-rose)', 'var(--g-blue)'];
let teachersList = [], studentsList = [];

// Safe fetch helper
async function safeFetch(promise, fallback = []) {
  try { return await promise; }
  catch (e) { console.error('Fetch error:', e); return fallback; }
}

async function loadUsers() {
  teachersList = await safeFetch(getUsersByRole('teacher'), []);
  studentsList = await safeFetch(getUsersByRole('student'), []);
  document.getElementById('teacher-count').textContent = `(${teachersList.length})`;
  document.getElementById('student-count').textContent = `(${studentsList.length})`;
  renderTeachers(teachersList);
  renderStudents(studentsList);
}

function renderTeachers(list) {
  const grid = document.getElementById('teachers-grid');
  if (!list.length) { grid.innerHTML = '<p style="color:var(--text-muted)">ගුරුවරුන් නොමැත.</p>'; return; }
  grid.innerHTML = list.map((t, i) => `
    <div class="user-card">
      <div class="u-avatar" style="background:${tColors[i % tColors.length]}">${t.full_name.charAt(0)}</div>
      <div class="u-info">
        <div class="u-name">${t.full_name}</div>
        <div class="u-meta eng">${t.whatsapp_number} · ${t.school || '—'}</div>
      </div>
      <div class="u-actions">
        <button class="btn btn-sm btn-outline" onclick='editUser(${JSON.stringify(t).replace(/'/g,"&#39;")})'>✏️</button>
        <button class="btn btn-sm btn-rose" style="padding:0.4rem 0.7rem" onclick="delUser('${t.id}','${t.full_name.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function renderStudents(list) {
  const grid = document.getElementById('students-grid');
  if (!list.length) { grid.innerHTML = '<p style="color:var(--text-muted)">සිසුන් නොමැත.</p>'; return; }
  grid.innerHTML = list.map((s, i) => `
    <div class="user-card">
      <div class="u-avatar" style="background:${tColors[(i + 2) % tColors.length]}">${s.full_name.charAt(0)}</div>
      <div class="u-info">
        <div class="u-name">${s.full_name}</div>
        <div class="u-meta eng">${s.whatsapp_number} · ${s.school || '—'} · ${s.address || '—'}</div>
      </div>
      <div class="u-actions">
        <button class="btn btn-sm btn-outline" onclick='editUser(${JSON.stringify(s).replace(/'/g,"&#39;")})'>✏️</button>
        <button class="btn btn-sm btn-rose" style="padding:0.4rem 0.7rem" onclick="delUser('${s.id}','${s.full_name.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

// Search
document.getElementById('search-teachers').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderTeachers(teachersList.filter(t => t.full_name.toLowerCase().includes(q) || t.whatsapp_number.includes(q)));
});
document.getElementById('search-students').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderStudents(studentsList.filter(s => s.full_name.toLowerCase().includes(q) || s.whatsapp_number.includes(q)));
});

// Edit User
window.editUser = (user) => {
  document.getElementById('eu-id').value = user.id;
  document.getElementById('eu-name').value = user.full_name;
  document.getElementById('eu-school').value = user.school || '';
  document.getElementById('eu-address').value = user.address || '';
  document.getElementById('eu-role').value = user.role;
  openModal('edit-user-modal');
};

document.getElementById('update-user-btn').addEventListener('click', async () => {
  const id = document.getElementById('eu-id').value;
  const btn = document.getElementById('update-user-btn');
  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    await updateUserProfile(id, {
      full_name: document.getElementById('eu-name').value,
      school: document.getElementById('eu-school').value,
      address: document.getElementById('eu-address').value,
      role: document.getElementById('eu-role').value,
    });
    showToast('පරිශීලකයා යාවත්කාලීන කරන ලදී ✅', 'success');
    closeModal('edit-user-modal');
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); }
  btn.disabled = false; btn.textContent = 'යාවත්කාලීන කරන්න';
});

// Delete User
window.delUser = async (id, name) => {
  if (!confirm(`"${name}" පරිශීලකයා මකා දැමිය යුතුද?\n\nමෙය ආපසු හැරවිය නොහැක!`)) return;
  try {
    await deleteUser(id);
    showToast('පරිශීලකයා මකා දමන ලදී', 'success');
    loadUsers();
  } catch (e) { showToast(e.message, 'error'); }
};

// Create Teacher
document.getElementById('save-teacher-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-teacher-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await createTeacher({
      full_name: document.getElementById('t-name').value,
      whatsapp_number: document.getElementById('t-wa').value,
      id_number: document.getElementById('t-id').value,
      school: document.getElementById('t-school').value,
      address: document.getElementById('t-address').value
    });
    showToast('ගුරුවරයා එකතු කරන ලදී ✅', 'success');
    closeModal('add-teacher-modal');
    document.getElementById('add-teacher-form').reset();
    loadUsers();
  } catch(err) {
    showToast('දෝෂයක්: ' + err.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'සුරකින්න';
});

loadUsers();
</script>
</body>
</html>
