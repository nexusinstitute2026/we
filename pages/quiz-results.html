<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus LMS | Premium Quiz Results</title>
<link rel="icon" type="image/png" href="/we/images/logo.png">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module" crossorigin src="/we/assets/quizResults-CULiH1B6.js"></script>
  <link rel="modulepreload" crossorigin href="/we/assets/ui-wgqUTf1L.js">
  <link rel="modulepreload" crossorigin href="/we/assets/quiz-DSzoKPk1.js">
  <link rel="stylesheet" crossorigin href="/we/assets/ui-BK4U8q2_.css">
  <link rel="stylesheet" crossorigin href="/we/assets/fonts-C8iiRjZX.css">
  <link rel="stylesheet" crossorigin href="/we/assets/course-BJa9aU_d.css">
</head>
<body class="results-page">

<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="container" style="max-width:800px; padding:4rem 1.5rem">
  <div id="results-loader" style="text-align:center; padding:5rem 0;">
    <div class="skeleton" style="width:200px; height:200px; border-radius:50%; margin:0 auto 2rem"></div>
    <div class="skeleton" style="width:300px; height:30px; margin:0 auto"></div>
  </div>

  <div id="results-content" style="display:none">
    <div class="results-hero">
      <div class="score-display">
        <div class="score-ring"></div>
        <div class="score-ring-fill" id="ring-fill"></div>
        <div class="score-main" id="score-num">0</div>
        <div class="score-label" id="score-total">OUT OF 0</div>
      </div>
      <h1 id="quiz-title" style="font-size:2rem; font-weight:900; margin-bottom:1rem">Quiz Title</h1>
      <div id="rank-container" style="display:none">
        <div class="rank-badge">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          RANK: <span id="rank-num">#1</span>
        </div>
      </div>
    </div>

    <div class="results-grid-premium eng">
      <div class="stat-card-premium">
        <div class="val" id="stat-percentage">0%</div>
        <div class="lbl">PERCENTAGE</div>
      </div>
      <div class="stat-card-premium">
        <div class="val" id="stat-time">0:00</div>
        <div class="lbl">TIME TAKEN</div>
      </div>
      <div class="stat-card-premium">
        <div class="val" id="stat-correct">0</div>
        <div class="lbl">CORRECT ANSWERS</div>
      </div>
    </div>

    <div class="review-section">
      <h3 style="font-family:'Outfit',sans-serif; font-weight:800; font-size:1.4rem; margin-bottom:2rem; text-align:center">පිළිතුරු සමාලෝචනය</h3>
      <div id="review-list"></div>
      
      <div style="text-align:center; margin-top:4rem">
        <a href="/dashboard/student.html" class="btn btn-teal btn-lg" style="min-width:280px">DASHBOARD වෙත යන්න</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

</body>
</html>
