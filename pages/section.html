<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus LMS | පන්ති මාලාව</title>
<link rel="icon" type="image/png" href="../images/logo.png">
<link rel="stylesheet" href="../fonts/fonts.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/dashboard.css">
<style>
.cat-wrap { background: #fff; border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.cat-title { font-size: 1.2rem; font-weight: 800; color: var(--teal); margin-bottom: 1rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
.sub-wrap { margin-bottom: 1.5rem; }
.sub-title { font-weight: 700; color: var(--dark); font-size: 1.1rem; display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; }
.sub-teacher { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; background: #f8fafc; padding: 0.3rem 0.8rem 0.3rem 0.3rem; border-radius: 2rem; border: 1px solid #e2e8f0; }
.t-img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
.courses-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.course-btn { display: flex; flex-direction: column; background: #fff; border: 1px solid #e2e8f0; border-radius: var(--radius-lg); text-decoration: none; color: inherit; transition: all 0.3s; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.course-btn:hover { border-color: var(--teal); transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
.c-name { font-weight: 800; font-family: 'Outfit', sans-serif; font-size: 1.15rem; color: var(--dark); }
.c-img { width: 100%; height: 160px; object-fit: cover; }
.c-body { padding: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>
<div class="dash-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><a href="../dashboard/student.html"><img src="../images/logo.png" alt="Nexus"><div><div class="brand-name eng">NEXUS</div><div class="brand-sub">LMS</div></div></a></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="../dashboard/student.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>මුල් පිටුව</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip" id="logout-btn"><div class="user-avatar">S</div><div class="user-info"><div class="user-name">Loading</div><div class="user-role">සිසුවා</div></div></div>
    </div>
  </aside>

  <div class="dash-main">
    <header class="topbar">
      <div class="topbar-left">
        <a href="../dashboard/student.html" class="btn btn-sm btn-outline" style="border:none;padding:0.5rem"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <h1 class="page-title" id="page-title">Loading...</h1>
      </div>
    </header>

    <main class="dash-content" style="max-width:900px" id="content-area">
      <div class="skeleton" style="height:300px;border-radius:1rem"></div>
    </main>
  </div>
</div>

<script type="module">
import { requireAuth, logout } from '../js/auth.js';
import { getMyEnrollments } from '../js/payment.js';
import supabase from '../js/supabase.js';

await requireAuth(['student']);
document.getElementById('logout-btn').addEventListener('click', logout);

const urlParams = new URLSearchParams(window.location.search);
const sectionId = urlParams.get('id');

async function loadSection() {
  if (!sectionId) return window.location.href = '../dashboard/student.html';

  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) throw new Error('ලොග් වී නොමැත.');

    const enrollments = await getMyEnrollments(user.id);

    const { data: section, error } = await supabase.from('sections')
      .select('name, categories(id, name, subjects(id, name, teacher:profiles(full_name, address), courses(id, name)))')
      .eq('id', sectionId).single();

    if (error) throw error;
    if (!section) throw new Error('පන්ති මාලාව හමු නොවීය.');

    document.getElementById('page-title').innerHTML = `${section.name} <span>පන්ති</span>`;

    let html = '';
    if (!section.categories || section.categories.length === 0) {
      html = '<div class="empty-state"><h3>පන්ති තවම ඇතුළත් කර නොමැත.</h3><p>පරිපාලක විසින් ඉක්මනින් පන්ති එකතු කරනු ඇත.</p></div>';
    } else {
      for (const cat of section.categories) {
        html += `<div class="cat-wrap">
          <div class="cat-title">${cat.name}</div>`;
        
        if (!cat.subjects || cat.subjects.length === 0) {
          html += '<p style="color:var(--text-muted);padding:0 1rem">විෂයයන් තවම ඇතුළත් කර නොමැත.</p>';
        } else {
          for (const sub of cat.subjects) {
            const tImg = sub.teacher?.address || '../images/default_avatar.png';
            html += `<div class="sub-wrap">
              <div class="sub-title">
                ${sub.name} 
                <span class="sub-teacher">
                  <img src="${tImg}" class="t-img" alt="Teacher"> 
                  ${sub.teacher?.full_name || 'Teacher TBD'}
                </span>
              </div>
              <div class="courses-list">
                ${(sub.courses && sub.courses.length > 0) ? sub.courses.map(c => {
                  const isEnrolled = enrollments.some(e => e.course_id === c.id);
                  const link = isEnrolled ? `../pages/course-months.html?id=${c.id}` : `../pages/payment.html?course_id=${c.id}`;
                  const icon = isEnrolled ? `<polyline points="9 18 15 12 9 6"/>` : `<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>`;
                  const text = isEnrolled ? 'පන්ති නරඹන්න' : 'Register / Pay';
                  return `
                  <a href="${link}" class="course-btn">
                    <img src="https://picsum.photos/300/160?random=${c.id}" class="c-img" alt="${c.name}">
                    <div class="c-body">
                      <div style="display:flex;flex-direction:column;gap:0.3rem">
                        <span class="c-name">${c.name}</span>
                        <span style="font-size:0.85rem;color:${isEnrolled ? 'var(--teal)' : 'var(--rose)'};font-weight:700">${text}</span>
                      </div>
                      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="${isEnrolled ? 'var(--teal)' : 'var(--rose)'}" stroke-width="2">${icon}</svg>
                    </div>
                  </a>
                `}).join('') : '<p style="font-size:0.85rem;color:var(--text-muted)">පන්ති (Courses) තවම ඇතුළත් කර නැත.</p>'}
              </div>
            </div>`;
          }
        }
        html += `</div>`;
      }
    }

    document.getElementById('content-area').innerHTML = html;
  } catch (err) {
    console.error(err);
    alert('දෝෂයකි: ' + err.message);
    window.location.href = '../dashboard/student.html';
  }
}

loadSection();
</script>
</body>
</html>
