<!DOCTYPE html>
<html lang="si">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus LMS | Student Dashboard</title>
  <link rel="icon" type="image/png" href="/we/images/logo.png">
  <style>
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .catalog-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }
    .cc-img { width: 100%; height: 160px; object-fit: cover; }
    .cc-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
      gap: 1rem;
      transition: transform 0.3s;
    }

    .catalog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .cat-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--dark);
    }

    .cat-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .enroll-btn {
      width: 100%;
      margin-top: auto;
    }

    /* Reminder Modal */
    .reminder-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .reminder-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .reminder-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 450px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .reminder-modal.active .reminder-content {
      transform: scale(1);
    }

    .reminder-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fef3c7;
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .reminder-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--dark);
    }

    .reminder-list {
      text-align: left;
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
  <script type="module" crossorigin src="/we/assets/studentDash-BfMO6vQ_.js"></script>
  <link rel="modulepreload" crossorigin href="/we/assets/ui-DbSpmO8X.js">
  <link rel="modulepreload" crossorigin href="/we/assets/payment-DH-CEloy.js">
  <link rel="modulepreload" crossorigin href="/we/assets/notifications-CpeD2Iiy.js">
  <link rel="stylesheet" crossorigin href="/we/assets/ui-BK4U8q2_.css">
  <link rel="stylesheet" crossorigin href="/we/assets/fonts-C8iiRjZX.css">
  <link rel="stylesheet" crossorigin href="/we/assets/dashboard-DM8ofIC3.css">
</head>

<body>
  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a href="/dashboard/student.html">
          <img src="/we/images/logo.png" alt="Nexus">
          <div>
            <div class="brand-name eng">NEXUS</div>
            <div class="brand-sub">LMS</div>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">ප්‍රධාන</div>
        <a class="nav-item active" data-page="home" href="/dashboard/student.html">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          මුල් පිටුව
        </a>
        <a class="nav-item" data-page="payment" href="/pages/payment.html">
          <svg viewBox="0 0 24 24">
            <rect x="1" y="4" width="22" height="16" rx="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg>
          ගෙවීම්
        </a>
        <div class="nav-section-label">ක්‍රියාකාරකම්</div>
        <a class="nav-item" href="/pages/leaderboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 6l4-4 4 4"/><path d="M12 2v20"/>
            <path d="M3 18l3-3 3 3"/><path d="M18 18l3-3-3-3"/>
          </svg>
          🏆 Leaderboard
        </a>
        <a class="nav-item" data-page="notifications" href="#" id="notif-nav">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          දැනුම්දීම්
          <span class="nav-badge hidden" id="nav-notif-badge">0</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="logout-btn">
          <div class="user-avatar" id="user-avatar">N</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">සිසුවා</div>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <div class="dash-main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
            <svg viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h1 class="page-title">සිසු <span>Dashboard</span></h1>
        </div>
        <div class="topbar-right">
          <div class="notif-btn" id="notif-btn" title="දැනුම්දීම්">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notif-count hidden" id="notif-count">0</span>
          </div>
        </div>
      </header>

      <main class="dash-content">
        <!-- My Enrollments -->
        <div class="section-header">
          <h2 id="courses">මගේ <span>පන්ති මාලාවන්</span></h2>
        </div>
        <div class="courses-grid" id="enrollments-grid">
          <div class="skeleton" style="height:150px;border-radius:1.5rem"></div>
        </div>

        <!-- Course Catalog -->
        <div class="section-header" style="margin-top:3rem">
          <h2 id="catalog">පන්ති <span>නාමාවලිය</span></h2>
        </div>
        <div class="catalog-grid" id="catalog-grid">
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
        </div>
      </main>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notif-panel">
      <div class="notif-panel-header">
        <h3>දැනුම්දීම්</h3>
        <button class="btn btn-sm btn-outline" id="mark-all-read">සියල්ල කියෙව්වා</button>
      </div>
      <div class="notif-list" id="notif-list"></div>
    </div>
  </div>

  <!-- Daily Reminder Modal -->
  <div class="reminder-modal" id="reminder-modal">
    <div class="reminder-content">
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </div>
      <h2 class="reminder-title">අද දින පන්ති මතක් කිරීම</h2>
      <p style="color:var(--text-muted);font-size:0.9rem">ඔබට අද දින පහත පන්ති සඳහා සහභාගී වීමට ඇත.</p>
      <div class="reminder-list" id="reminder-list"></div>
      <button class="btn btn-teal" style="width:100%" onclick="closeReminder()">හරි, ස්තුතියි</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

</body>

</html>
