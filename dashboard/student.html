<!DOCTYPE html>
<html lang="si">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus LMS | Student Dashboard</title>
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="stylesheet" href="../fonts/fonts.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .catalog-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }
    .cc-img { width: 100%; height: 160px; object-fit: cover; }
    .cc-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
      gap: 1rem;
      transition: transform 0.3s;
    }

    .catalog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .cat-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--dark);
    }

    .cat-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .enroll-btn {
      width: 100%;
      margin-top: auto;
    }

    /* Reminder Modal */
    .reminder-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .reminder-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .reminder-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 450px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .reminder-modal.active .reminder-content {
      transform: scale(1);
    }

    .reminder-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fef3c7;
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .reminder-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--dark);
    }

    .reminder-list {
      text-align: left;
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1rem;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a href="../dashboard/student.html">
          <img src="../images/logo.png" alt="Nexus">
          <div>
            <div class="brand-name eng">NEXUS</div>
            <div class="brand-sub">LMS</div>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">ප්‍රධාන</div>
        <a class="nav-item active" data-page="home" href="../dashboard/student.html">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          මුල් පිටුව
        </a>
        <a class="nav-item" data-page="payment" href="../pages/payment.html">
          <svg viewBox="0 0 24 24">
            <rect x="1" y="4" width="22" height="16" rx="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg>
          ගෙවීම්
        </a>
        <div class="nav-section-label">ක්‍රියාකාරකම්</div>
        <a class="nav-item" href="../pages/leaderboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 6l4-4 4 4"/><path d="M12 2v20"/>
            <path d="M3 18l3-3 3 3"/><path d="M18 18l3-3-3-3"/>
          </svg>
          🏆 Leaderboard
        </a>
        <a class="nav-item" data-page="notifications" href="#" id="notif-nav">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          දැනුම්දීම්
          <span class="nav-badge hidden" id="nav-notif-badge">0</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="logout-btn">
          <div class="user-avatar" id="user-avatar">N</div>
          <div class="user-info">
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">සිසුවා</div>
          </div>
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <div class="dash-main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
            <svg viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <h1 class="page-title">සිසු <span>Dashboard</span></h1>
        </div>
        <div class="topbar-right">
          <div class="notif-btn" id="notif-btn" title="දැනුම්දීම්">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="notif-count hidden" id="notif-count">0</span>
          </div>
        </div>
      </header>

      <main class="dash-content">
        <!-- My Enrollments -->
        <div class="section-header">
          <h2 id="courses">මගේ <span>පන්ති මාලාවන්</span></h2>
        </div>
        <div class="courses-grid" id="enrollments-grid">
          <div class="skeleton" style="height:150px;border-radius:1.5rem"></div>
        </div>

        <!-- Course Catalog -->
        <div class="section-header" style="margin-top:3rem">
          <h2 id="catalog">පන්ති <span>නාමාවලිය</span></h2>
        </div>
        <div class="catalog-grid" id="catalog-grid">
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
          <div class="skeleton" style="height:200px;border-radius:1.5rem"></div>
        </div>
      </main>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notif-panel">
      <div class="notif-panel-header">
        <h3>දැනුම්දීම්</h3>
        <button class="btn btn-sm btn-outline" id="mark-all-read">සියල්ල කියෙව්වා</button>
      </div>
      <div class="notif-list" id="notif-list"></div>
    </div>
  </div>

  <!-- Daily Reminder Modal -->
  <div class="reminder-modal" id="reminder-modal">
    <div class="reminder-content">
      <div class="reminder-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </div>
      <h2 class="reminder-title">අද දින පන්ති මතක් කිරීම</h2>
      <p style="color:var(--text-muted);font-size:0.9rem">ඔබට අද දින පහත පන්ති සඳහා සහභාගී වීමට ඇත.</p>
      <div class="reminder-list" id="reminder-list"></div>
      <button class="btn btn-teal" style="width:100%" onclick="closeReminder()">හරි, ස්තුතියි</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { requireAuth, logout, populateUserChip } from '../js/auth.js';
    import { getMyEnrollments } from '../js/payment.js';
    import { getNotifications, getUnreadCount, markAllRead, updateNotifBadge, renderNotifications, subscribeNotifications, initNotificationClicks } from '../js/notifications.js';
    import { initSidebar, initNotifPanel, showToast, statusBadge, initReveal } from '../js/ui.js';
    import supabase from '../js/supabase.js';

    const colors = ['teal', 'gold', 'purple', 'rose'];

    const profile = await requireAuth(['student']);
    if (!profile) throw new Error('Not authorized');

    populateUserChip(profile); initSidebar(); initNotifPanel(); initNotificationClicks('notif-list');
    document.getElementById('notif-list').dataset.userId = profile.id;
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('notif-nav').addEventListener('click', (e) => {
      e.preventDefault(); document.getElementById('notif-panel').classList.toggle('active');
    });

    // Safe fetch helper
    async function safeFetch(promise, fallback = []) {
      try { 
        const res = await promise;
        if (res && res.error) {
          console.error('Supabase Error:', res.error);
          return fallback;
        }
        return res;
      }
      catch (e) { console.error('Fetch error:', e); return fallback; }
    }

    const enrollments = await safeFetch(getMyEnrollments(profile.id), []);
    const sectionsRes = await safeFetch(supabase.from('sections').select('*').order('created_at'), { data: [] });
    const allSections = sectionsRes.data || [];
    let notifications = await safeFetch(getNotifications(profile.id), []);
    let unread = await safeFetch(getUnreadCount(profile.id), 0);

    // Notifications setup
    updateNotifBadge(unread);
    if (unread > 0) {
      const nb = document.getElementById('nav-notif-badge');
      if (nb) { nb.textContent = unread; nb.classList.remove('hidden'); }
    }
    renderNotifications(notifications, 'notif-list');
    document.getElementById('mark-all-read').addEventListener('click', async () => {
      await markAllRead(profile.id); updateNotifBadge(0);
      const nb = document.getElementById('nav-notif-badge');
      if (nb) nb.classList.add('hidden');
      showToast('සියලු දැනුම්දීම් කියෙව්වා', 'success');
      renderNotifications(notifications.map(n => ({ ...n, is_read: true })), 'notif-list');
    });

    // My Enrollments rendering
    const eGrid = document.getElementById('enrollments-grid');
    if (!enrollments.length) {
      eGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.247 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    <h3>පන්ති මාලාවන් නොමැත</h3><p>පහතින් ඇති නාමාවලියෙන් ඔබට අවශ්‍ය පන්ති මාලාවට ලියාපදිංචි වන්න.</p>
  </div>`;
    } else {
      eGrid.innerHTML = enrollments.map((e, i) => `
    <a class="course-card-dash reveal" href="../pages/course-months.html?id=${e.course_id}" style="text-decoration:none;color:inherit;min-height:140px">
      <img src="https://picsum.photos/300/200?random=${e.course_id}" class="cc-img" alt="Course Image">
      <div class="cc-body">
        <h3 class="cc-title">${e.course?.name || 'Unknown Course'}</h3>
        <p class="cc-meta">${e.course?.subject?.name || ''} · ${e.course?.subject?.category?.section?.name || ''}</p>
      </div>
    </a>
  `).join('');
    }

    // Catalog rendering
    const cGrid = document.getElementById('catalog-grid');
    if (!allSections.length) {
      cGrid.innerHTML = '<p style="color:var(--text-muted)">නාමාවලිය දැනට හිස්ය.</p>';
    } else {
      cGrid.innerHTML = allSections.map(s => `
    <div class="catalog-card reveal" style="padding:0; overflow:hidden; display:flex; flex-direction:column; background:#fff;">
      <img src="https://picsum.photos/400/200?random=${s.id}" style="width:100%;height:180px;object-fit:cover;" alt="Section Image">
      <div style="padding:1.5rem; flex:1; display:flex; flex-direction:column;">
        <h3 class="cat-title">${s.name}</h3>
        <p class="cat-desc" style="flex:1;">${s.description || 'පවතින සියලුම පාඨමාලා නරඹන්න.'}</p>
        <a href="../pages/section.html?id=${s.id}" class="btn btn-teal enroll-btn" style="text-align:center;width:100%">පන්ති නරඹන්න &rarr;</a>
      </div>
    </div>
  `).join('');
    }

    // Class Reminders
    async function checkDailyClasses() {
      const today = new Date();
      const dayStr = today.toISOString().split('T')[0];

      const { data: sessions, error } = await supabase
        .from('sessions')
        .select('*, course_months!inner(course_id, name, course:courses(name))')
        .eq('start_time', dayStr);

      if (error || !sessions?.length) return;

      // Filter sessions student is enrolled in
      const mySessions = sessions.filter(s => enrollments.some(e => e.course_id === s.course_months.course_id));
      if (!mySessions.length) return;

      const list = document.getElementById('reminder-list');
      list.innerHTML = mySessions.map(s => `
    <div style="margin-bottom:0.75rem;padding:0.75rem;background:white;border-radius:0.5rem;border:1px solid #e2e8f0">
      <div style="font-weight:800;color:var(--teal)">${s.course_months.course.name}</div>
      <div style="font-size:0.85rem">${s.title}</div>
      <div style="font-size:0.8rem;color:var(--gold);margin-top:0.25rem">⏰ ${s.start_time ? new Date(s.start_time).toLocaleTimeString('si-LK', { hour: '2-digit', minute: '2-digit' }) : 'අද දින'}</div>
    </div>
  `).join('');

      document.getElementById('reminder-modal').classList.add('active');
    }

    window.closeReminder = () => document.getElementById('reminder-modal').classList.remove('active');
    checkDailyClasses();

    // Push Registration
    import { subscribeToPush } from '../js/push.js';
    subscribeToPush(profile.id);

    subscribeNotifications(profile.id, (n) => {
      // Clean URL from message for toast
      let toastMsg = n.message.replace(/\|URL:.*$/, '').trim();
      showToast('නව දැනුම්දීමක්: ' + toastMsg, 'success');
      
      notifications.unshift(n);
      unread++;
      updateNotifBadge(unread);
      renderNotifications(notifications, 'notif-list');
      
      // Update nav badge too
      const nb = document.getElementById('nav-notif-badge');
      if (nb) { nb.textContent = unread; nb.classList.remove('hidden'); }
    });

    // Initialize reveal after content is rendered
    initReveal();
  </script>
</body>

</html>
